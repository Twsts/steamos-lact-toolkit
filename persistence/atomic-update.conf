# Preserve SteamOS LACT Toolkit and AMD overdrive files across SteamOS atomic updates.
#
# SteamOS already preserves most /etc/systemd/system units by default. The
# important extra paths here are /etc/lact and the amdgpu ppfeaturemask file.

/etc/lact/**
/etc/modprobe.d/99-amdgpu-overdrive.conf

/etc/atomic-update.conf.d/steamos-lact-toolkit.conf
/etc/steamos-lact-toolkit/**

/etc/systemd/system/steamos-lact-restore.service
/etc/systemd/system/steamos-lact-restore.timer
/etc/systemd/system/timers.target.wants/steamos-lact-restore.timer
